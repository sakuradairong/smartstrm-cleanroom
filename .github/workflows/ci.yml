name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: test -z "$(find cmd internal -type f -name '*.go' -print0 | xargs -0 gofmt -l)"
      - name: Check module metadata
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race ./...
      - name: Validate JSON
        run: python3 -m json.tool config.example.json >/dev/null
      - name: Check Markdown links
        run: python3 scripts/check_markdown_links.py
      - name: Validate Compose
        run: docker compose config -q
      - name: Check whitespace
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD
      - name: Build container
        run: docker build --tag smartstrm-cleanroom:ci .
